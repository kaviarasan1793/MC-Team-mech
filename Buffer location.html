<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffer Location Maintenance - Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        /* --- THEME VARIABLES --- */
        :root {
            --bg-body: #f0f4f8; --surface: #ffffff;
            --text-main: #1e293b; --text-sub: #64748b;
            --border: #e2e8f0; --input-bg: #f8fafc;
            --shadow-3d: 0 4px 10px rgba(0,0,0,0.05), 0 2px 2px rgba(0,0,0,0.03);
            --shadow-hover: 0 8px 20px rgba(0,0,0,0.08), 0 5px 5px rgba(0,0,0,0.03);
            --primary-grad: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --blue-light: #eff6ff; --blue-dark: #3b82f6;
            --red-light: #fef2f2; --red-dark: #ef4444;
            --orange-light: #fff7ed; --orange-dark: #f97316;
            --black-light: #334155; --black-dark: #0f172a;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a; --surface: #1e293b;
            --text-main: #f1f5f9; --text-sub: #94a3b8;
            --border: #334155; --input-bg: #0f172a;
            --shadow-3d: 0 5px 15px rgba(0,0,0,0.4);
            --blue-light: rgba(59, 130, 246, 0.2);
            --red-light: rgba(239, 68, 68, 0.2);
            --orange-light: rgba(249, 115, 22, 0.2);
            --black-light: #475569; --black-dark: #000000;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-body); margin: 0; padding: 15px; color: var(--text-main); transition: all 0.3s ease; font-size: 13px; }

        .header { background: var(--surface); padding: 8px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-3d); margin-bottom: 20px; min-height: 40px; flex-wrap: wrap; gap: 10px; border-bottom: 3px solid #e2e8f0; }
        .header h1 { margin: 0; font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .header h1 span { -webkit-text-fill-color: initial; font-size: 18px; }

        .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .search-inp { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-main); font-size: 12px; width: 140px; transition: 0.3s; }
        .search-inp:focus { border-color: var(--blue-dark); width: 180px; background: var(--surface); outline: none; }
        .btn-circle { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: 0.2s; }
        .btn-circle:hover { background: var(--blue-dark); color: white; border-color: var(--blue-dark); transform: scale(1.1); }
        .btn-text { background: var(--input-bg); border: 1px solid var(--border); border-radius: 20px; padding: 0 12px; height: 30px; font-size: 11px; font-weight: 700; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-text:hover { background: var(--blue-dark); color: white; border-color: var(--blue-dark); }
        .btn-text:disabled { opacity: 0.5; cursor: not-allowed; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--surface); padding: 15px; border-radius: 12px; cursor: pointer; box-shadow: var(--shadow-3d); display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid transparent; border: 2px solid transparent; transition: all 0.2s; }
        .stat-card:hover, .stat-card.active-filter { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--blue-dark); }
        .stat-info h3 { margin: 0; font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-sub); }
        .stat-info .val { font-size: 24px; font-weight: 800; margin-top: 2px; color: var(--text-main); line-height: 1; }
        .icon-box { width: 45px; height: 45px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .card-blue { border-bottom-color: var(--blue-dark); } .card-blue .icon-box { background: var(--blue-light); color: var(--blue-dark); }
        .card-red { border-bottom-color: var(--red-dark); } .card-red .icon-box { background: var(--red-light); color: var(--red-dark); }
        .card-black { border-bottom-color: var(--black-dark); } .card-black .icon-box { background: var(--black-light); color: white; }
        .card-black .val { color: var(--black-dark); } [data-theme="dark"] .card-black .val { color: white; }

        .form-panel { background: var(--surface); padding: 20px; border-radius: 15px; box-shadow: var(--shadow-3d); margin-bottom: 20px; border-left: 4px solid var(--blue-dark); transition: 0.3s; }
        .form-panel.editing { border-left-color: var(--orange-dark); background: var(--orange-light); }
        [data-theme="dark"] .form-panel.editing { background: rgba(249, 115, 22, 0.1); }
        .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 10px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }
        input[type="text"], input[type="date"], input[type="number"], input[type="password"], select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--input-bg); color: var(--text-main); font-weight: 500; }
        input:focus, select:focus { border-color: var(--blue-dark); outline: none; background: var(--surface); }
        .btn-save { background: var(--primary-grad); color: white; border: none; padding: 9px 25px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 3px 0 #1d4ed8; margin-left: auto; transition: 0.2s; }
        .btn-save:active { transform: translateY(3px); box-shadow: none; }
        .btn-save:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-cancel { background: var(--text-sub); color: white; border: none; padding: 9px 15px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; display: none; }
        .btn-cancel-modal { background: transparent; color: var(--text-sub); border: 1px solid var(--border); padding: 9px 15px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-cancel-modal:hover { background: var(--border); }

        .table-wrap { background: var(--surface); border-radius: 15px; overflow: hidden; box-shadow: var(--shadow-3d); margin-bottom: 80px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        thead { background: var(--input-bg); }
        th { padding: 12px; text-align: left; font-size: 11px; color: var(--text-sub); text-transform: uppercase; font-weight: 700; border-bottom: 2px solid var(--border); }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-main); font-weight: 500; }
        .chk-cell { width: 30px; text-align: center; }
        input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--blue-dark); }
        .row-selected td { background-color: var(--blue-light); }
        [data-theme="dark"] .row-selected td { background-color: rgba(59, 130, 246, 0.1); }

        .sh-A { background: #e0f2fe; color: #0284c7; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
        .sh-B { background: #ffedd5; color: #ea580c; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
        .sh-C { background: #f3e8ff; color: #9333ea; padding: 2px 8px; border-radius: 4px; font-weight: 700; }

        .status-tag { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; gap: 5px; }
        .st-green { background: #dcfce7; color: #166534; }
        .st-yellow { background: #fef9c3; color: #854d0e; }
        .st-red { background: #fee2e2; color: #991b1b; }
        .st-black { background: var(--black-dark); color: white; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .loc-badge { background: var(--input-bg); border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 12px; font-weight: 700; color: var(--blue-dark); }
        
        .actions { display: flex; gap: 5px; }
        .btn-act { width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 12px; border: 1px solid var(--border); background: white; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-act:hover { filter: brightness(0.9); }
        .btn-edit { color: var(--orange-dark); } 
        .btn-del { color: var(--red-dark); }

        .bulk-bar { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--surface); box-shadow: 0 -5px 25px rgba(0,0,0,0.15); padding: 15px 30px; border-radius: 30px; display: flex; gap: 20px; align-items: center; transition: bottom 0.4s; z-index: 100; border: 2px solid var(--red-dark); }
        .bulk-bar.show { bottom: 30px; }
        .bulk-text { font-weight: 700; color: var(--text-main); font-size: 14px; }
        .btn-bulk-del { background: var(--red-dark); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-bulk-del:hover { background: #b91c1c; }
        .btn-bulk-del:disabled { opacity: 0.7; cursor: not-allowed; }

        .toast { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: var(--text-main); color: var(--surface); padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: top 0.4s; z-index: 1000; }
        .toast.show { top: 30px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: var(--surface); padding: 25px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 300px; display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--border); }
        .modal-box h3 { margin: 0; font-size: 16px; color: var(--text-main); display: flex; align-items: center; gap: 8px;}
        .modal-box input { font-size: 20px; letter-spacing: 5px; text-align: center; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }

        @media print {
            body { background: white; padding: 0; }
            .controls, .form-panel, .bulk-bar, .actions, .chk-cell, #toast, .btn-circle, .btn-text { display: none !important; }
            .header { box-shadow: none; border-bottom: 2px solid #000; margin-bottom: 10px; }
            .stats-grid { gap: 5px; margin-bottom: 10px; }
            .stat-card { border: 1px solid #000; box-shadow: none; padding: 10px; break-inside: avoid; }
            .table-wrap { box-shadow: none; }
            table { border: 1px solid #000; }
            th, td { border: 1px solid #ddd; padding: 8px; font-size: 11px; }
            .status-tag, .loc-badge, .sh-A, .sh-B, .sh-C { border: 1px solid #000; background: transparent !important; color: #000 !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><span>🏭</span> Buffer Location Maintenance</h1>
        <div class="controls">
            <input type="text" id="sInput" class="search-inp" onkeyup="window.render()" placeholder="Search Part or Loc...">
            <button class="btn-text" onclick="window.downloadTemplate()" title="Download Excel Template">📄 Template</button>
            <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="window.handleBulkUpload(event)">
            <button class="btn-text" id="btnUpload" onclick="document.getElementById('csvFileInput').click()" style="border-color: var(--blue-dark); color: var(--blue-dark);" title="Upload Filled CSV">📤 Upload</button>
            <button class="btn-text" onclick="window.copyShiftSummary()" title="Copy status to clipboard" style="background: var(--blue-light); color: var(--blue-dark); border-color: var(--blue-dark);">📋 Summary</button>
            <button class="btn-circle" onclick="window.print()" title="Print Report">🖨️</button>
            <button class="btn-circle" onclick="window.toggleTheme()" title="Theme">🌗</button>
            <button class="btn-circle" onclick="window.openPinModal('CHANGE_PIN')" title="Change PIN">🔑</button>
            <button class="btn-circle" onclick="window.exportData()" title="Export Excel">📥</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card card-blue active-filter" id="cardALL" onclick="window.setFilter('ALL')">
            <div class="stat-info"><h3>Total Active</h3><div class="val" id="kpiTotal">0</div></div><div class="icon-box">📦</div>
        </div>
        <div class="stat-card card-red" id="cardCRIT" onclick="window.setFilter('CRIT')">
            <div class="stat-info"><h3>Critical (7-9 Days)</h3><div class="val" id="kpiCrit">0</div></div><div class="icon-box">🔥</div>
        </div>
        <div class="stat-card card-black" id="cardOVER" onclick="window.setFilter('OVER')">
            <div class="stat-info"><h3>Overdue (10+ Days)</h3><div class="val" id="kpiOver">0</div></div><div class="icon-box">🛑</div>
        </div>
    </div>

    <div class="form-panel" id="formPanel">
        <div class="form-row">
            <div class="field"><label>📅 Date In</label><input type="date" id="iDate"></div>
            <div class="field"><label>⏰ Shift</label><select id="iShift" style="width:60px;"><option>A</option><option>B</option><option>C</option></select></div>
            <div class="field"><label>📍 Location</label><input type="text" id="iLoc" placeholder="e.g. RACK-1" style="width:90px;"></div>
            <div class="field"><label>⚙️ Part NO</label><input type="text" id="iPart" placeholder="Part#" style="width:120px;"></div>
            <div class="field"><label>🏷️ Model</label><input type="text" id="iModel" placeholder="Model" style="width:110px;"></div>
            <div class="field"><label>📊 Qty</label><input type="number" id="iQty" placeholder="0" style="width:70px;"></div>
            <div class="field" style="flex:1"><label>📝 Reason</label><input type="text" id="iReason" placeholder="Enter reason..." onkeypress="if(event.key==='Enter') window.add()"></div>
            <button class="btn-cancel" id="btnCancel" onclick="window.cancelEdit()">CANCEL</button>
            <button class="btn-save" id="btnSave" onclick="window.add()">+ SAVE ENTRY</button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th class="chk-cell"><input type="checkbox" id="chkAll" onchange="window.toggleSelectAll()"></th>
                    <th>Date In</th><th>Shift</th><th>Location</th><th>Part NO</th><th>Model</th><th>Qty</th><th>Reason</th><th>Status</th><th class="actions">Actions</th>
                </tr>
            </thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>

    <div id="bulkBar" class="bulk-bar">
        <div class="bulk-text"><span id="bulkCount">0</span> Items Selected</div>
        <button class="btn-bulk-del" id="btnBulkDel" onclick="window.openPinModal('VERIFY_BULK')">✓ Clear Selected Items</button>
    </div>

    <div id="toast" class="toast">Notification Message</div>

    <div id="pinModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="pinTitle">🔐 Security Verification</h3>
            <input type="password" id="pinInput" placeholder="Current PIN" onkeypress="if(event.key==='Enter') window.submitPinModal()">
            <input type="password" id="pinNewInput" placeholder="New PIN" style="display:none;" onkeypress="if(event.key==='Enter') window.submitPinModal()">
            <div class="modal-actions">
                <button class="btn-cancel-modal" onclick="window.closePinModal()">Cancel</button>
                <button class="btn-save" onclick="window.submitPinModal()">Confirm</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAiZl9YhGsfKIKTTK5hMqqhWoIiYbri9rI",
            authDomain: "material-controler.firebaseapp.com",
            projectId: "material-controler",
            storageBucket: "material-controler.firebasestorage.app",
            messagingSenderId: "782401252699",
            appId: "1:782401252699:web:19d6775e92c428c224fe7e"
        };

        const app = initializeApp(firebaseConfig);
        const firestoreDb = getFirestore(app);
        const bufferCollection = collection(firestoreDb, "buffer_locations");

        let data = [];
        let currentFilter = 'ALL';
        let editModeId = null;
        let selectedIds = new Set(); 

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
        
        window.toggleTheme = function() {
            const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next); localStorage.setItem('theme', next);
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        window.playSound = function(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        window.getPin = function() { return localStorage.getItem("buf_pin") || "1234"; }
        
        let pendingModalAction = '';
        let pendingModalId = null;

        window.openPinModal = function(actionType, id = null) {
            pendingModalAction = actionType; pendingModalId = id;
            document.getElementById('pinInput').value = ''; document.getElementById('pinNewInput').value = '';
            
            let title = document.getElementById('pinTitle');
            let newPinInput = document.getElementById('pinNewInput');

            if(actionType === 'CHANGE_PIN') {
                title.innerHTML = "🔑 Change System PIN"; newPinInput.style.display = "block";
            } else {
                title.innerHTML = "🔐 Enter PIN to Continue"; newPinInput.style.display = "none";
            }

            document.getElementById('pinModal').style.display = 'flex';
            document.getElementById('pinInput').focus();
        }

        window.closePinModal = function() { document.getElementById('pinModal').style.display = 'none'; }

        window.submitPinModal = function() {
            let current = document.getElementById('pinInput').value;
            if (current !== window.getPin()) {
                window.playSound('error'); window.showToast("❌ Incorrect PIN entered");
                document.getElementById('pinInput').value = ''; document.getElementById('pinInput').focus();
                return;
            }

            if (pendingModalAction === 'CHANGE_PIN') {
                let newVal = document.getElementById('pinNewInput').value;
                if (!newVal) { window.playSound('error'); return window.showToast("⚠️ Enter a new PIN"); }
                localStorage.setItem("buf_pin", newVal);
                window.playSound('success'); window.showToast("✅ PIN Updated"); window.closePinModal();
            } 
            else if (pendingModalAction === 'VERIFY_DEL') { window.closePinModal(); window.executeDel(pendingModalId); } 
            else if (pendingModalAction === 'VERIFY_EDIT') { window.closePinModal(); window.executeEdit(pendingModalId); } 
            else if (pendingModalAction === 'VERIFY_BULK') { window.closePinModal(); window.executeBulkDelete(); }
        }

        let toastTimeout;
        window.showToast = function(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            clearTimeout(toastTimeout); toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
        }
        
        window.toDDMMYYYY = function(dateStr) {
            if(!dateStr) return "";
            let parts = dateStr.split('-'); 
            if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
            return dateStr;
        }

        window.parseAnyDate = function(dateStr) {
            if (!dateStr) return null;
            dateStr = String(dateStr).trim();
            let parts = dateStr.split(/[\/\-]/);
            if (parts.length === 3) {
                let p1 = parseInt(parts[0], 10); let p2 = parseInt(parts[1], 10); let p3 = parseInt(parts[2], 10); 
                if (p3 > 1000) { let d = new Date(p3, p2 - 1, p1); if (!isNaN(d.getTime())) return d; } 
                else if (p1 > 1000) { let d = new Date(p1, p2 - 1, p3); if (!isNaN(d.getTime())) return d; }
            }
            let d = new Date(dateStr);
            if (!isNaN(d.getTime())) return d;
            return null; 
        }

        window.formatDate = function(d) {
            let yyyy = d.getFullYear();
            let mm = String(d.getMonth() + 1).padStart(2, '0');
            let dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        window.getAge = function(d) { 
            let parsedDate = window.parseAnyDate(d);
            if(!parsedDate) return 0; 
            let today = new Date();
            today.setHours(0,0,0,0); parsedDate.setHours(0,0,0,0);
            return Math.max(0, Math.floor((today - parsedDate) / (1000 * 60 * 60 * 24))); 
        }
        
        document.getElementById('iDate').valueAsDate = new Date();

        window.downloadTemplate = function() {
            let csvContent = "Date In,Shift,Location,Part NO,Model,Qty,Reason\n";
            let today = window.toDDMMYYYY(window.formatDate(new Date())); 
            csvContent += `${today},A,RACK-A1,PART-1001,MODEL-X,50,Waiting for QC\n`;
            let blob = new Blob([csvContent], { type: 'text/csv' });
            let a = document.createElement('a');
            a.setAttribute('href', window.URL.createObjectURL(blob));
            a.setAttribute('download', 'Buffer_Upload_Template.csv');
            a.click(); window.showToast("📄 Template Downloaded.");
        }

        window.handleBulkUpload = function(event) {
            let file = event.target.files[0];
            if (!file) return;

            const uploadBtn = document.getElementById('btnUpload');
            const originalText = uploadBtn.innerHTML;
            uploadBtn.innerHTML = 'Uploading...';
            uploadBtn.disabled = true;

            Papa.parse(file, {
                header: true, skipEmptyLines: true,
                complete: async function(results) {
                    let itemsAdded = 0;
                    try {
                        const batch = writeBatch(firestoreDb);
                        results.data.forEach((row, index) => {
                            if(row["Part NO"] && row["Location"] && row["Qty"]) {
                                let rawDate = row["Date In"]; let parsedD = window.parseAnyDate(rawDate);
                                let safeDate = parsedD ? window.formatDate(parsedD) : window.formatDate(new Date());
                                
                                const newDocRef = doc(bufferCollection);
                                batch.set(newDocRef, {
                                    date: safeDate, shift: row["Shift"] || "A",
                                    loc: String(row["Location"]).toUpperCase(), part: String(row["Part NO"]).toUpperCase(),
                                    model: String(row["Model"] || "").toUpperCase(), qty: row["Qty"], reason: row["Reason"] || "-",
                                    timestamp: Date.now() + index
                                });
                                itemsAdded++;
                            }
                        });
                        
                        if(itemsAdded > 0) { 
                            await batch.commit();
                            window.playSound('success'); window.showToast(`✅ Uploaded ${itemsAdded} items!`); 
                        } else { 
                            window.playSound('error'); window.showToast("⚠️ No valid data found."); 
                        }
                    } catch (error) {
                        console.error("Bulk Upload Error:", error);
                        window.showToast("❌ Error uploading data.");
                    } finally {
                        document.getElementById('csvFileInput').value = ''; 
                        uploadBtn.innerHTML = originalText;
                        uploadBtn.disabled = false;
                    }
                }
            });
        }

        window.copyShiftSummary = function() {
            let tot = data.length;
            let healthy = 0, warning = 0, crit = 0, over = 0;
            
            data.forEach(x => {
                let d = window.getAge(x.date);
                if (d >= 10) over++;
                else if (d >= 7) crit++;
                else if (d >= 4) warning++;
                else healthy++;
            });

            let currentShift = document.getElementById('iShift').value;

            let text = `🏭 *SHIFT HANDOVER SUMMARY* 🏭\n`;
            text += `📅 Date: ${window.toDDMMYYYY(window.formatDate(new Date()))} | ⏰ Shift: ${currentShift}\n\n`;
            text += `📊 *OVERALL STATUS*\n`;
            text += `📦 Total Parts in Buffer: ${tot}\n`;
            text += `🟢 Healthy (0-3d): ${healthy}\n`;
            text += `⚠️ Warning (4-6d): ${warning}\n`;
            text += `🔥 Critical (7-9d): ${crit}\n`;
            text += `🛑 Overdue (10+d): ${over}\n`;

            navigator.clipboard.writeText(text).then(() => { 
                window.playSound('success'); 
                window.showToast("📋 Shift Summary Copied!"); 
            });
        }

        window.setFilter = function(filterType) {
            currentFilter = filterType;
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
            document.getElementById('card' + filterType).classList.add('active-filter');
            selectedIds.clear(); window.render();
        }

        window.add = async function() {
            let rowData = {
                date: document.getElementById('iDate').value, shift: document.getElementById('iShift').value,
                loc: document.getElementById('iLoc').value.toUpperCase() || "N/A", part: document.getElementById('iPart').value.toUpperCase(),
                model: document.getElementById('iModel').value.toUpperCase(), qty: document.getElementById('iQty').value,
                reason: document.getElementById('iReason').value || "-"
            };
            if(!rowData.part || !rowData.qty || !rowData.loc) { window.playSound('error'); return window.showToast("⚠️ Fill Location, Part, and Qty"); }
            
            const saveBtn = document.getElementById('btnSave');
            const origText = saveBtn.innerText;
            saveBtn.innerText = "Saving...";
            saveBtn.disabled = true;

            try {
                if (editModeId) {
                    await updateDoc(doc(firestoreDb, "buffer_locations", editModeId), rowData);
                    window.playSound('success'); window.showToast("✅ Entry Updated"); 
                    window.cancelEdit();
                } else {
                    rowData.timestamp = Date.now();
                    await addDoc(bufferCollection, rowData);
                    window.playSound('success'); window.showToast("✅ Added to " + rowData.loc);
                    document.getElementById('iPart').value=''; document.getElementById('iModel').value='';
                    document.getElementById('iQty').value=''; document.getElementById('iReason').value='';
                    document.getElementById('iPart').focus(); 
                }
            } catch (error) {
                console.error("Save error:", error);
                window.showToast("❌ Error saving data. Check rules.");
            } finally {
                saveBtn.innerText = origText;
                saveBtn.disabled = false;
            }
        }

        window.executeEdit = function(id) {
            let row = data.find(x => x.id === id);
            if(!row) return;
            editModeId = id;
            document.getElementById('iDate').value = row.date; document.getElementById('iShift').value = row.shift;
            document.getElementById('iLoc').value = row.loc; document.getElementById('iPart').value = row.part;
            document.getElementById('iModel').value = row.model; document.getElementById('iQty').value = row.qty;
            document.getElementById('iReason').value = row.reason !== "-" ? row.reason : "";
            
            document.getElementById('formPanel').classList.add('editing');
            document.getElementById('btnSave').innerText = "💾 UPDATE ENTRY";
            document.getElementById('btnCancel').style.display = "inline-block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.cancelEdit = function() {
            editModeId = null; document.getElementById('formPanel').classList.remove('editing');
            document.getElementById('btnSave').innerText = "+ SAVE ENTRY"; document.getElementById('btnCancel').style.display = "none";
            document.getElementById('iDate').valueAsDate = new Date();
            document.getElementById('iPart').value=''; document.getElementById('iModel').value='';
            document.getElementById('iQty').value=''; document.getElementById('iReason').value='';
        }

        window.toggleSelect = function(id) {
            if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
            window.updateBulkUI();
            let row = document.getElementById('row-'+id);
            if(row) row.classList.toggle('row-selected', selectedIds.has(id));
        }

        window.toggleSelectAll = function() {
            let isChecked = document.getElementById('chkAll').checked;
            let currentVisibleCheckboxes = document.querySelectorAll('.row-chk');
            currentVisibleCheckboxes.forEach(chk => {
                let id = chk.value; chk.checked = isChecked;
                if(isChecked) selectedIds.add(id); else selectedIds.delete(id);
                let row = document.getElementById('row-'+id);
                if(row) row.classList.toggle('row-selected', isChecked);
            });
            window.updateBulkUI();
        }

        window.updateBulkUI = function() {
            let bar = document.getElementById('bulkBar');
            document.getElementById('bulkCount').innerText = selectedIds.size;
            if(selectedIds.size > 0) bar.classList.add('show'); else bar.classList.remove('show');
        }

        window.executeBulkDelete = async function() {
            const bulkBtn = document.getElementById('btnBulkDel');
            const origText = bulkBtn.innerText;
            bulkBtn.innerText = 'Deleting...';
            bulkBtn.disabled = true;

            try {
                const batch = writeBatch(firestoreDb);
                selectedIds.forEach(id => {
                    batch.delete(doc(firestoreDb, "buffer_locations", id));
                });
                await batch.commit();
                
                selectedIds.clear(); document.getElementById('chkAll').checked = false;
                window.updateBulkUI(); 
                window.playSound('success'); window.showToast("🗑️ Selected items deleted forever");
            } catch (error) {
                console.error("Bulk delete error", error);
                window.showToast("❌ Error deleting items.");
            } finally {
                bulkBtn.innerText = origText;
                bulkBtn.disabled = false;
            }
        }

        window.executeDel = async function(id) {
            try {
                await deleteDoc(doc(firestoreDb, "buffer_locations", id));
                window.playSound('success'); window.showToast("🗑️ Item deleted forever");
            } catch (error) {
                console.error("Delete error", error);
                window.showToast("❌ Error deleting item.");
            }
        }

        window.render = function() {
            let tb = document.getElementById('tBody'); tb.innerHTML='';
            let s = document.getElementById('sInput').value.toUpperCase();
            
            let globalCrit=0, globalOver=0;
            data.forEach(x => { let d = window.getAge(x.date); if(d >= 10) globalOver++; else if(d >= 7) globalCrit++; });

            document.getElementById('kpiTotal').innerText = data.length;
            document.getElementById('kpiCrit').innerText = globalCrit;
            document.getElementById('kpiOver').innerText = globalOver;

            let displayData = data;
            if(currentFilter === 'CRIT') displayData = data.filter(x => window.getAge(x.date) >= 7 && window.getAge(x.date) < 10);
            if(currentFilter === 'OVER') displayData = data.filter(x => window.getAge(x.date) >= 10);

            let allCheckedStatus = true; let visibleCount = 0;

            displayData.filter(x => x.part.includes(s) || x.model.includes(s) || (x.loc && x.loc.includes(s))).forEach(x => {
                let d = window.getAge(x.date); let cls='st-green', ic='🟢';
                if(d >= 10){ cls='st-black'; ic='🛑'; } else if(d >= 7){ cls='st-red'; ic='🔥'; } else if(d >= 4){ cls='st-yellow'; ic='⚠️'; }            
                
                let isChecked = selectedIds.has(x.id);
                if(!isChecked) allCheckedStatus = false;
                visibleCount++;

                let rowCls = isChecked ? 'row-selected' : '';
                let displayDate = window.toDDMMYYYY(x.date);

                tb.innerHTML+=`<tr id="row-${x.id}" class="${rowCls}">
                    <td class="chk-cell"><input type="checkbox" class="row-chk" value="${x.id}" ${isChecked ? 'checked' : ''} onchange="window.toggleSelect('${x.id}')"></td>
                    <td>${displayDate}</td>
                    <td><span class="sh-${x.shift}">${x.shift}</span></td>
                    <td><span class="loc-badge">${x.loc || 'N/A'}</span></td>
                    <td><strong>${x.part}</strong></td>
                    <td>${x.model}</td><td>${x.qty}</td><td style="color:var(--text-sub);">${x.reason}</td>
                    <td><span class="status-tag ${cls}">${ic} ${d} Days</span></td>
                    <td class="actions">
                        <button class="btn-act btn-edit" onclick="window.openPinModal('VERIFY_EDIT', '${x.id}')" title="Edit">✏️</button>
                        <button class="btn-act btn-del" onclick="window.openPinModal('VERIFY_DEL', '${x.id}')" title="Clear">✓</button>
                    </td>
                </tr>`;
            });

            document.getElementById('chkAll').checked = (visibleCount > 0 && allCheckedStatus);
            window.updateBulkUI();
        }

        window.exportData = function() {
            if(data.length === 0) { window.playSound('error'); return window.showToast("⚠️ No data to export"); }
            
            let c = "Date In,Shift,Location,Part NO,Model,Qty,Reason,Current Ageing\n";
            data.forEach((x,i) => {
                let finalCol = window.getAge(x.date);
                let exportDate = window.toDDMMYYYY(x.date);
                c += `${exportDate},${x.shift},${x.loc||'N/A'},${x.part},${x.model},${x.qty},${x.reason},${finalCol}\n`;
            });
            
            let a = document.createElement('a'); a.href = window.URL.createObjectURL(new Blob([c],{type:'text/csv'}));
            a.download = `Active_Buffer_${window.toDDMMYYYY(window.formatDate(new Date()))}.csv`; a.click(); 
            window.playSound('success'); window.showToast("📥 Download started");
        }

        // Firebase Real-time Listener
        document.addEventListener('DOMContentLoaded', () => {
            const q = query(bufferCollection, orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                data = [];
                snapshot.forEach((doc) => {
                    data.push({ id: doc.id, ...doc.data() });
                });
                window.render();
            });
        });

    </script>
</body>
</html>
