<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MC Dashboard - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    :root {
      --primary: #0f5c9c; /* Nokia Blue */
      --secondary: #00d2ff;
      --grad: linear-gradient(to right, #0f5c9c, #00d2ff);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: #f6f5f7;
      background-image: linear-gradient(60deg, #29323c 0%, #485563 100%);
      display: flex; justify-content: center; align-items: center; height: 100vh;
      overflow: hidden;
    }

    .container {
      background-color: #fff;
      border-radius: 100px;
      box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
      position: relative;
      overflow: hidden;
      width: 800px; max-width: 100%; min-height: 550px;
    }

    /* FORMS */
    .form-container {
      position: absolute; top: 0; height: 100%; transition: all 0.6s ease-in-out;
    }

    .sign-in-container { left: 0; width: 50%; z-index: 2; }
    .container.right-panel-active .sign-in-container { transform: translateX(100%); }

    .forgot-pw-container {
      left: 0; width: 50%; opacity: 0; z-index: 1;
    }
    .container.right-panel-active .forgot-pw-container {
      transform: translateX(100%); opacity: 1; z-index: 5; animation: show 0.6s;
    }

    @keyframes show { 0%, 49.99% { opacity: 0; z-index: 1; } 50%, 100% { opacity: 1; z-index: 5; } }

    form {
      background-color: #FFFFFF; display: flex; align-items: center; justify-content: center;
      flex-direction: column; padding: 0 50px; height: 100%; text-align: center;
    }

    /* --- LOGO: CENTERED & BIGGER --- */
    .nokia-logo { 
        width: 180px;        /* Increased size */
        margin-bottom: 20px; /* Spacing below logo */
        display: block;
        /* No absolute position means it centers automatically in flexbox */
    }
    
    h1 { font-weight: bold; margin: 0; margin-bottom: 5px; color: #333; }
    
    /* MOTIVATION SLIDER */
    .slider-box {
      height: 40px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
      width: 100%;
    }
    .slider-text {
      font-size: 0.85rem; color: var(--primary); font-style: italic; font-weight: 500;
      animation: fadeEffect 4s infinite;
    }
    @keyframes fadeEffect { 0% {opacity: 0;} 20% {opacity: 1;} 80% {opacity: 1;} 100% {opacity: 0;} }

    /* INPUTS & BUTTONS */
    input {
      background-color: #eee; border: none; padding: 12px 15px; margin: 8px 0; width: 100%; border-radius: 5px; outline: none;
    }

    button {
      border-radius: 20px; border: 1px solid var(--primary);
      background: var(--grad); color: #FFFFFF; font-size: 12px; font-weight: bold;
      padding: 12px 45px; letter-spacing: 1px; text-transform: uppercase;
      transition: transform 80ms ease-in; cursor: pointer; margin-top: 20px;
    }
    button:active { transform: scale(0.95); }
    button:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    button.ghost { background: transparent; border-color: #FFFFFF; }

    /* OVERLAY */
    .overlay-container {
      position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
      overflow: hidden; transition: transform 0.6s ease-in-out; z-index: 100;
    }
    .container.right-panel-active .overlay-container { transform: translateX(-100%); }

    .overlay {
      background: var(--primary);
      background: var(--grad);
      background-repeat: no-repeat; background-size: cover; background-position: 0 0;
      color: #FFFFFF; position: relative; left: -100%; height: 100%; width: 200%;
      transform: translateX(0); transition: transform 0.6s ease-in-out;
    }
    .container.right-panel-active .overlay { transform: translateX(50%); }

    .overlay-panel {
      position: absolute; display: flex; align-items: center; justify-content: center;
      flex-direction: column; padding: 0 40px; text-align: center; top: 0; height: 100%; width: 50%;
    }
    
    .overlay-panel h1 { color: #FFFFFF !important; margin-bottom: 10px; }
    .overlay-panel p { color: #f1f1f1 !important; font-size: 0.9rem; margin-bottom: 20px; }

    .overlay-left { transform: translateX(-20%); }
    .container.right-panel-active .overlay-left { transform: translateX(0); }
    .overlay-right { right: 0; transform: translateX(0); }
    .container.right-panel-active .overlay-right { transform: translateX(20%); }
    
    .msg-box { font-size: 0.8rem; color: green; margin-top: 10px; font-weight: bold; min-height: 20px; }
    .error { color: red; }
  </style>
</head>
<body>

<div class="container" id="container">
  
  <div class="form-container forgot-pw-container">
    <form onsubmit="window.handleReset(event)">
      <img src="nokia.png" alt="NOKIA" class="nokia-logo" onerror="this.style.display='none'">
      <h1>Reset Access</h1>
      <p style="font-size:0.8rem; color:#666; margin-bottom:15px;">Enter email to reset Admin password.</p>
      <input type="email" placeholder="Confirm Email" required />
      <button id="resetBtn">Reset & Show Password</button>
      <div id="resetMsg" class="msg-box"></div>
    </form>
  </div>

  <div class="form-container sign-in-container">
    <form onsubmit="window.handleLogin(event)">
      <img src="nokia.png" alt="NOKIA" class="nokia-logo" onerror="this.style.display='none'; this.nextElementSibling.innerText='Nokia'">
      
      <h1>Sign In</h1>
      
      <div class="slider-box">
        <div class="slider-text" id="motivationText">Loading...</div>
      </div>
      
      <input type="text" id="user" placeholder="Username" required />
      <input type="password" id="pass" placeholder="Password" required />
      <button id="loginBtn">Log In 🔓</button>
      
      <div id="loginMsg" class="msg-box"></div>
    </form>
  </div>

  <div class="overlay-container">
    <div class="overlay">
      <div class="overlay-panel overlay-left">
        <h1>Already Fixed?🔑</h1>
        <p>If you recovered your password, go back to login.</p>
        <button class="ghost" id="signIn">Sign In</button>
      </div>
      <div class="overlay-panel overlay-right">
        <h1>Forgot Password?🔐</h1>
        <p>Don't worry. Click here to reset your credentials.</p>
        <button class="ghost" id="signUp">Reset It⚙️</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAiZl9YhGsfKIKTTK5hMqqhWoIiYbri9rI",
      authDomain: "material-controler.firebaseapp.com",
      projectId: "material-controler",
      storageBucket: "material-controler.firebasestorage.app",
      messagingSenderId: "782401252699",
      appId: "1:782401252699:web:19d6775e92c428c224fe7e"
  };

  const app = initializeApp(firebaseConfig);
  const firestoreDb = getFirestore(app);

  const signUpButton = document.getElementById('signUp');
  const signInButton = document.getElementById('signIn');
  const container = document.getElementById('container');

  signUpButton.addEventListener('click', () => container.classList.add("right-panel-active"));
  signInButton.addEventListener('click', () => container.classList.remove("right-panel-active"));

  window.onload = () => {
    // Clear old local users if any exist
    localStorage.removeItem('users');
    startMotivation();
  };

  const quotes = [
    "Quality is not an act, it is a habit.",
    "Believe you can and you're halfway there.",
    "Connecting People, Connecting Future.",
    "Success is where preparation meets opportunity."
  ];
  let qIdx = 0;
  function startMotivation() {
    const el = document.getElementById('motivationText');
    el.innerText = quotes[0];
    setInterval(() => {
      qIdx = (qIdx + 1) % quotes.length;
      el.innerText = quotes[qIdx];
    }, 4000);
  }

  // --- FIREBASE LOGIN LOGIC ---
  window.handleLogin = async function(e) {
    e.preventDefault();
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value;
    const msg = document.getElementById('loginMsg');
    const btn = document.getElementById('loginBtn');
    
    msg.className = 'msg-box';
    msg.innerText = "Authenticating...";
    btn.disabled = true;

    try {
        const userRef = doc(firestoreDb, "users", u);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
            const userData = userSnap.data();
            if (userData.password === p) {
                msg.className = 'msg-box';
                msg.innerText = "Success! Redirecting...";
                // Save current user locally for the session
                localStorage.setItem('currentUser', JSON.stringify(userData));
                
                // --- NOTE: Ensure your main dashboard file is named 'dashboard.html' ---
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                msg.className = 'msg-box error';
                msg.innerText = "Invalid Password";
            }
        } else {
            msg.className = 'msg-box error';
            msg.innerText = "User not found in database";
        }
    } catch (error) {
        console.error("Login Error:", error);
        msg.className = 'msg-box error';
        msg.innerText = "Database connection error. Check your internet or Firebase Rules.";
    } finally {
        btn.disabled = false;
    }
  }

  // --- FIREBASE RESET LOGIC ---
  window.handleReset = async function(e) {
    e.preventDefault();
    const msg = document.getElementById('resetMsg');
    const btn = document.getElementById('resetBtn');
    
    msg.className = 'msg-box';
    msg.innerText = "Resetting Admin Account...";
    btn.disabled = true;

    try {
        // This creates or overwrites the "admin" document with default credentials
        await setDoc(doc(firestoreDb, "users", "admin"), {
            username: 'admin',
            password: 'admin123',
            role: 'admin',
            email: 'admin@nokia.com'
        });
        
        msg.innerText = "Reset Success: admin / admin123";
        alert("SYSTEM RESTORED.\n\nUsername: admin\nPassword: admin123\n\nPlease go back to Sign In.");
    } catch (error) {
        console.error("Reset Error:", error);
        msg.className = 'msg-box error';
        msg.innerText = "Failed to reset. Check Firebase permissions.";
    } finally {
        btn.disabled = false;
    }
  }
</script>
</body>
</html>
