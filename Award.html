<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Awards - Manager Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --glass-bg: rgba(20, 30, 60, 0.7); 
            --gold-primary: #FFD700;
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --card-bg: linear-gradient(145deg, #0f2044 0%, #0a152e 100%);
        }

        body {
            background: linear-gradient(-45deg, #081b38, #132b5e, #081b38);
            background-size: 400% 400%;
            animation: gradientBG 60s ease infinite;
            font-family: 'Outfit', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
            user-select: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- HEADER --- */
        .main-header { text-align: center; margin-top: 15px; margin-bottom: 15px; }
        .trophy-icon { color: var(--gold-primary); filter: drop-shadow(0 0 7px rgba(255, 215, 0, 0.4)); margin-bottom: 5px; }
        .trophy-icon i { font-size: 2em; }
        
        .main-header h1 {
            font-family: 'Cinzel', serif; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px;
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(0, 0, 0, 0.5); margin-bottom: 2px; font-weight: 700;
        }
        .subtitle { font-family: 'Outfit', sans-serif; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: #a3bffa; margin-top: 2px; }

        /* --- FORM --- */
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.15); border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); padding: 8px 15px;
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center;
        }
        .form-control-custom {
            background: rgba(30, 50, 90, 0.6); border: 1px solid rgba(255,255,255,0.1); 
            color: #cbd5e1; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; flex: 1 1 160px;
        }
        .btn-save {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%); 
            color: white; border: none; padding: 8px 25px; border-radius: 30px; 
            font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); transition: 0.3s;
        }
        .btn-update { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .btn-save:disabled { opacity: 0.7; cursor: not-allowed; }

        /* --- TOOLBAR --- */
        .toolbar {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            padding: 6px 20px; gap: 15px; margin-top: 15px; margin-bottom: 20px;
            background: rgba(0,0,0,0.2); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);
        }

        .search-wrap { position: relative; flex: 1; max-width: 210px; }
        .search-wrap input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #475569;
            color: white; padding: 6px 10px 6px 35px; border-radius: 20px; font-size: 0.9rem;
        }
        .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.8rem; }

        .view-toggle span { font-size: 0.85rem; color: #a3bffa; font-weight: 600; margin-right: 5px; }
        
        .btn-slideshow {
            background: var(--gold-gradient); color: #0f172a; font-weight: 800; border: none;
            padding: 7px 14px; border-radius: 20px; text-transform: uppercase; font-size: 0.9rem;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            margin-left: auto;
        }

        /* --- GALLERY --- */
        .employee-card-wrapper { position: relative; height: 100%; transition: all 0.3s ease; }
        .employee-card-wrapper:hover { transform: translateY(-5px); }
        .employee-card {
            background: var(--card-bg); border: 2px solid #1e3a8a; border-radius: 15px; padding: 10px;
            text-align: center; height: 100%; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .card-img-container {
            width: 100%; height: 130px; border-radius: 10px; overflow: hidden; 
            border: 2px solid var(--gold-primary); margin-bottom: 10px; background: rgba(0,0,0,0.2);
        }
        .employee-photo { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        .card-name {
            font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; 
            color: var(--gold-primary); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;
        }
        
        .card-badges { display: flex; justify-content: center; gap: 8px; }
        .badge-batch, .badge-month {
            background: #0f172a; border: 1px solid #3b82f6; color: #fff;
            padding: 4px 12px; border-radius: 6px; font-weight: 600; font-size: 0.75rem;
        }
        
        .action-btn-group {
            position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; opacity: 0; transition: 0.3s; z-index: 10;
        }
        .employee-card-wrapper:hover .action-btn-group { opacity: 1; }
        .action-icon {
            width: 28px; height: 28px; border-radius: 5px; border: none; color: white;
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem;
        }
        .btn-del { background: #ef4444; }
        .btn-edit { background: #3b82f6; }

        /* --- SLIDESHOW STYLES --- */
        .modal-fullscreen .modal-content {
            background: radial-gradient(circle at center, #1e3c72 0%, #000428 100%);
            display: flex; flex-direction: column; justify-content: space-between;
            overflow: hidden; padding-bottom: 0; 
        }
        
        .slide-title {
            font-family: 'Cinzel', serif; font-size: 2rem; color: var(--gold-primary); 
            text-transform: uppercase; letter-spacing: 2px; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .slide-img-container {
            flex-grow: 1; width: 100%; height: 100%; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        .slide-img {
            border: 2px solid var(--gold-primary); box-shadow: 0 0 50px rgba(0,0,0,0.8);
            width: 100%; height: 100%; transition: opacity 0.5s ease;
        }
        .fit-contain { object-fit: contain; }
        .fit-cover { object-fit: cover; }

        .slide-name-gold {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 2.5rem; 
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 3px 15px rgba(0,0,0,0.8); text-transform: uppercase;
        }
        .slide-detail-text { font-size: 1.1rem; color: white; font-weight: 400; }

        .download-btn {
            position: absolute; bottom: 30px; right: 30px; z-index: 300;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            color: white; width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
            cursor: pointer; transition: 0.3s;
        }
        .download-btn:hover { background: var(--gold-primary); color: black; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="container">
        <header class="main-header">
            <div class="trophy-icon"><i class="fas fa-trophy"></i></div>
            <h1>Employee of the Month</h1>
            <div class="subtitle">Hall of Fame</div>
        </header>

        <form id="awardForm" class="glass-panel mb-3">
            <input type="hidden" id="editId" value="">
            <input type="file" id="chooseFile" class="form-control-custom" accept="image/*" style="padding: 7px;" required />
            <input type="text" id="awardedName" class="form-control-custom" placeholder="Employee Name" required autocomplete="off" />
            <select id="batch" class="form-control-custom" required>
                <option value="" disabled selected>Select Batch</option>
                <option value="A1">Batch A1</option><option value="A2">Batch A2</option>
                <option value="A3">Batch A3</option><option value="A7">Batch A7</option>
            </select>
            <select id="awardMonth" class="form-control-custom" required>
                <option value="" disabled selected>Select Month & Year</option>
            </select>
            <button type="submit" id="submitBtn" class="btn-save"><i class="fas fa-crown me-2"></i>AWARD</button>
            <button type="button" id="cancelEditBtn" class="btn-save" style="display:none; background: #64748b;">❌CANCEL</button>
        </form>

        <div class="toolbar">
            <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search winners...">
            </div>

            <div class="view-toggle d-flex align-items-center">
                <span>🖥️View reframe:</span>
                <div class="form-check form-check-inline m-0">
                    <input class="form-check-input" type="radio" name="viewMode" id="modeFit" value="contain" checked>
                    <label class="form-check-label text-white small" for="modeFit">Fit</label>
                </div>
                <div class="form-check form-check-inline m-0">
                    <input class="form-check-input" type="radio" name="viewMode" id="modeFill" value="cover">
                    <label class="form-check-label text-white small" for="modeFill">Fill</label>
                </div>
            </div>

            <button onclick="startSlideshow()" class="btn-slideshow"><i class="fas fa-play me-2"></i> Slideshow</button>
        </div>

        <div class="text-center text-secondary small mb-3">Total Winners: <span id="totalCount" class="text-white">0</span></div>

        <div id="employeeGallery" class="row gy-4"></div>
    </div>

    <div class="modal fade" id="slideshowModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content" id="captureArea">
                
                <button type="button" class="btn position-absolute top-0 end-0 m-4 text-white fs-1" style="z-index: 300;" onclick="stopSlideshow()">
                    <i class="fas fa-times"></i>
                </button>

                <button class="download-btn" onclick="downloadSlide()" title="Save Image">
                    <i class="fas fa-camera"></i>
                </button>

                <div style="height: 10vh; display: flex; align-items: center; justify-content: center; z-index: 20; background: rgba(0,0,0,0.3);">
                    <h1 class="slide-title"><i class="fas fa-trophy me-2"></i>Employee of the Month</h1>
                </div>

                <div class="slide-img-container">
                    <img id="slideImage" src="" class="slide-img fit-contain">
                </div>

                <div style="height: 18vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); z-index: 20;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <h2 id="slideName" class="slide-name-gold">NAME</h2>
                        <span style="font-size: 2.2rem;">🏅</span>
                    </div>
                    <div class="slide-detail-text mt-1 d-flex gap-3 align-items-center">
                        <span class="text-secondary">Batch:</span>
                        <span id="slideBatch" style="border: 1px solid #00d2ff; padding: 4px 25px; border-radius: 30px; font-weight: bold; font-size: 1.1rem;">A1</span>
                        <span style="color: #666;">|</span>
                        <span id="slideMonth" style="font-weight: 700; text-transform: uppercase;">MONTH YEAR</span>
                    </div>
                </div>

                <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.1);">
                    <div id="slideProgress" style="height: 100%; background: var(--gold-primary); width: 0%;"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAiZl9YhGsfKIKTTK5hMqqhWoIiYbri9rI",
          authDomain: "material-controler.firebaseapp.com",
          projectId: "material-controler",
          storageBucket: "material-controler.firebasestorage.app",
          messagingSenderId: "782401252699",
          appId: "1:782401252699:web:19d6775e92c428c224fe7e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let employeeData = [];
        let filteredData = []; 
        let slideIndex = 0;
        let slideInterval;
        let slideshowModal;
        const SLIDE_DURATION = 5000;
        let existingImage = null;

        document.addEventListener('DOMContentLoaded', () => {
            initMonthDropdown();
            slideshowModal = new bootstrap.Modal(document.getElementById('slideshowModal'));
            loadData();

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                filteredData = employeeData.filter(emp => 
                    emp.name.toLowerCase().includes(term) || emp.batch.toLowerCase().includes(term)
                );
                renderGallery(filteredData);
            });

            document.addEventListener('keydown', (e) => {
                if (!document.getElementById('slideshowModal').classList.contains('show')) return;
                if (e.key === 'ArrowRight') {
                    clearInterval(slideInterval);
                    slideIndex = (slideIndex + 1) % filteredData.length;
                    updateSlide();
                    resetInterval();
                } else if (e.key === 'ArrowLeft') {
                    clearInterval(slideInterval);
                    slideIndex = (slideIndex - 1 + filteredData.length) % filteredData.length;
                    updateSlide();
                    resetInterval();
                } else if (e.key === 'Escape') {
                    window.stopSlideshow();
                }
            });
        });

        function loadData() {
            onSnapshot(collection(db, "employees"), (snapshot) => {
                employeeData = [];
                snapshot.forEach((doc) => {
                    employeeData.push({ id: doc.id, ...doc.data() });
                });
                
                employeeData.sort((a, b) => b.createdAt - a.createdAt);
                
                const term = document.getElementById('searchInput').value.toLowerCase();
                filteredData = employeeData.filter(emp => 
                    emp.name.toLowerCase().includes(term) || emp.batch.toLowerCase().includes(term)
                );
                
                renderGallery(filteredData);
                document.getElementById('totalCount').innerText = `${employeeData.length}`;
            });
        }

        window.deleteFromDB = async function(id) {
            if(!confirm("Remove this winner?")) return;
            try {
                await deleteDoc(doc(db, "employees", id));
            } catch (error) {
                console.error("Error deleting document: ", error);
                alert("Failed to delete record.");
            }
        };

        window.editWinner = function(id) {
            const emp = employeeData.find(e => e.id === id);
            if(!emp) return;
            
            document.getElementById('editId').value = emp.id;
            document.getElementById('awardedName').value = emp.name;
            document.getElementById('batch').value = emp.batch;
            document.getElementById('awardMonth').value = emp.month;
            existingImage = emp.imageUrl; 
            
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-save me-2"></i> UPDATE';
            btn.classList.add('btn-update');
            document.getElementById('cancelEditBtn').style.display = 'inline-block';
            document.getElementById('chooseFile').required = false; 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        document.getElementById('cancelEditBtn').onclick = resetFormState;

        function resetFormState() {
            document.getElementById('awardForm').reset();
            document.getElementById('editId').value = "";
            existingImage = null;
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-crown me-2"></i> AWARD';
            btn.classList.remove('btn-update');
            document.getElementById('cancelEditBtn').style.display = 'none';
            document.getElementById('chooseFile').required = true;
        }

        // Image compression function updated for high quality
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000; // Updated to 1000 for better clarity
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.85)); // Updated to 85% quality
                    };
                };
            });
        }

        document.getElementById('awardForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('chooseFile');
            const editId = document.getElementById('editId').value;
            const btn = document.getElementById('submitBtn');
            const originalBtnHtml = btn.innerHTML;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> UPLOADING...';
            btn.disabled = true;

            try {
                let finalImageUrl = existingImage;

                if (fileInput.files && fileInput.files[0]) {
                    finalImageUrl = await compressImage(fileInput.files[0]);
                }

                const record = {
                    name: document.getElementById('awardedName').value.trim(),
                    batch: document.getElementById('batch').value,
                    month: document.getElementById('awardMonth').value,
                    imageUrl: finalImageUrl
                };

                if (editId) {
                    await updateDoc(doc(db, "employees", editId), record);
                } else {
                    record.createdAt = Date.now();
                    await addDoc(collection(db, "employees"), record);
                }

                triggerConfetti();
                resetFormState();
            } catch (error) {
                console.error("Error saving data: ", error);
                alert("There was an error saving the award. Check the console.");
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
            }
        });

        function renderGallery(data) {
            const gallery = document.getElementById('employeeGallery');
            gallery.innerHTML = '';
            if(data.length === 0) {
                gallery.innerHTML = '<div class="text-center text-white-50 w-100 mt-4">No winners found.</div>';
                return;
            }
            data.forEach((emp) => {
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-3';
                col.innerHTML = `
                    <div class="employee-card-wrapper">
                        <div class="action-btn-group">
                            <button class="action-icon btn-edit" onclick="editWinner('${emp.id}')"><i class="fas fa-pen"></i></button>
                            <button class="action-icon btn-del" onclick="deleteFromDB('${emp.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="employee-card">
                            <div class="card-img-container">
                                <img src="${emp.imageUrl}" class="employee-photo" onclick="startSlideshow('${emp.id}')" loading="lazy">
                            </div>
                            <div class="card-name">${emp.name}</div>
                            <div class="card-badges">
                                <span class="badge-batch">${emp.batch}</span>
                                <span class="badge-month">${emp.month}</span>
                            </div>
                        </div>
                    </div>`;
                gallery.appendChild(col);
            });
        }

        window.startSlideshow = function(startId = null) {
            if(filteredData.length === 0) return;
            slideIndex = startId ? filteredData.findIndex(e => e.id === startId) : 0;
            const viewMode = document.querySelector('input[name="viewMode"]:checked').value;
            const img = document.getElementById('slideImage');
            img.className = viewMode === 'contain' ? 'slide-img fit-contain' : 'slide-img fit-cover';
            slideshowModal.show();
            updateSlide();
            resetInterval();
        };

        window.stopSlideshow = function() { 
            clearInterval(slideInterval); 
            slideshowModal.hide(); 
        };

        function resetInterval() {
            clearInterval(slideInterval);
            const bar = document.getElementById('slideProgress');
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(() => { bar.style.transition = `width ${SLIDE_DURATION}ms linear`; bar.style.width = '100%'; }, 50);
            slideInterval = setInterval(() => {
                slideIndex = (slideIndex + 1) % filteredData.length;
                updateSlide();
                bar.style.transition = 'none'; bar.style.width = '0%';
                setTimeout(() => { bar.style.transition = `width ${SLIDE_DURATION}ms linear`; bar.style.width = '100%'; }, 50);
            }, SLIDE_DURATION);
        }

        function updateSlide() {
            const emp = filteredData[slideIndex];
            const img = document.getElementById('slideImage');
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = emp.imageUrl; 
                document.getElementById('slideName').textContent = emp.name;
                document.getElementById('slideBatch').textContent = emp.batch.replace('Batch ', '');
                document.getElementById('slideMonth').textContent = emp.month;
                img.style.opacity = 1;
            }, 100);
        }

        window.downloadSlide = function() {
            clearInterval(slideInterval);
            const element = document.querySelector('.modal-content');
            const dlBtn = document.querySelector('.download-btn');
            if(dlBtn) dlBtn.style.display = 'none';
            
            html2canvas(element, { backgroundColor: '#000428', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Winner-${document.getElementById('slideName').textContent}.png`;
                link.href = canvas.toDataURL();
                link.click();
                if(dlBtn) dlBtn.style.display = 'flex';
                resetInterval();
            }).catch(err => {
                console.error("Canvas export failed:", err);
                if(dlBtn) dlBtn.style.display = 'flex';
                resetInterval();
            });
        };

        function initMonthDropdown() {
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            let html = '<option value="" disabled selected>Select Month & Year</option>';
            const startYear = 2025; 
            for(let y = startYear; y <= startYear + 3; y++) {
                months.forEach(m => html += `<option value="${m} ${y}">${m} ${y}</option>`);
            }
            document.getElementById('awardMonth').innerHTML = html;
        }

        function triggerConfetti() {
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#FFD700', '#00d2ff', '#ffffff'] });
        }
    </script>
</body>
</html>
