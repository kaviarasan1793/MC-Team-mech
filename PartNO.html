<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Part Number View - Folder Organization</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 10px;
    }
    
    .container {
      max-width: 1450px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      color: white;
      padding: 7px 25px;
      text-align: center;
      position: relative;
    }
    
    .header h1 {
      font-size: 2.5em;
      font-weight: 400;
      letter-spacing: 0px;
      position: relative;
      z-index: 1;
    }
    
    .controls {
      background: #f8f9fa;
      padding: 16px 30px;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      justify-content: center;
    }
    
    /* FIXED FILE INPUT BUTTON */
    .file-input-wrapper {
      position: relative;
      display: inline-block;
      background: linear-gradient(135deg, #3498db, #2980b9);
      border-radius: 15px;
      color: white;
      padding: 12px 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
      overflow: visible;
    }
    
    .file-input-wrapper:hover {
      background: linear-gradient(135deg, #2980b9, #3498db);
      transform: translateY(-2px);
      box-shadow: 0 5px 150px rgba(52, 152, 219, 0.4);
    }
    
    .file-input-wrapper input[type="file"] {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    
    .folder-controls {
      background: #ecf0f1;
      padding: 18px 30px;
      border-bottom: 1px solid #d5dbdb;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
    }
    
    .folder-input {
      padding: 10px 15px;
      border: 2px solid #bdc3c7;
      border-radius: 20px;
      font-size: 14px;
      width: 200px;
      transition: all 0.3s ease;
    }
    
    .folder-input:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
    }
    
    .folder-tabs {
      background: #fff;
      padding: 0 30px;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      overflow-x: auto;
    }
    
    .folder-tab {
      padding: 12px 20px;
      background: #ecf0f1;
      border: none;
      border-radius: 15px 15px 0 0;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      margin-bottom: -1px;
    }
    
    .folder-tab.active {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
    }
    
    .folder-tab:hover:not(.active) {
      background: #d5dbdb;
    }
    
    .folder-count {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 12px;
      margin-left: 8px;
    }
    
    .delete-folder {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      cursor: pointer;
      margin-left: 8px;
      display: none;
    }
    
    .folder-tab:hover .delete-folder {
      display: inline-block;
    }
    
    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .btn-create {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
    }
    
    .btn-create:hover:not(:disabled) {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
    }
    
    .btn-save {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
    }
    
    .btn-save:hover:not(:disabled) {
      background: linear-gradient(135deg, #e67e22, #f39c12);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
    }
    
    .btn-view {
      background: linear-gradient(135deg, #8e44ad, #9b59b6);
      color: white;
    }
    
    .btn-view:hover:not(:disabled) {
      background: linear-gradient(135deg, #9b59b6, #8e44ad);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(155, 89, 182, 0.4);
    }
    
    .btn-delete {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
    }
    
    .btn-delete:hover:not(:disabled) {
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
    }
    
    .search-input {
      padding: 12px 20px;
      border: 2px solid #bdc3c7;
      border-radius: 25px;
      font-size: 14px;
      width: 300px;
      transition: all 0.3s ease;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
    }
    
    .selection-controls {
      background: #ecf0f1;
      padding: 15px 30px;
      border-bottom: 1px solid #d5dbdb;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .select-all-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .select-all-wrapper input[type="checkbox"] {
      transform: scale(1.2);
    }
    
    .selected-count {
      color: #e74c3c;
      font-weight: 600;
    }
    
    .status {
      background: #ecf0f1;
      padding: 15px 30px;
      color: #2c3e50;
      font-weight: 500;
      border-bottom: 1px solid #d5dbdb;
    }
    
    .progress-container {
      background: #ecf0f1;
      padding: 0 30px 15px;
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #bdc3c7;
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3498db, #2ecc71);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    
    .preview {
      padding: 30px;
      text-align: center;
      background: #fff;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .preview img {
      max-width: 100%;
      max-height: 500px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
    }
    
    .preview img:hover {
      transform: scale(1.02);
    }
    
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
      padding: 30px;
      background: #f8f9fa;
      max-height: 500px;
      overflow-y: auto;
    }
    
    .gallery::-webkit-scrollbar {
      width: 8px;
    }
    
    .gallery::-webkit-scrollbar-track {
      background: #ecf0f1;
      border-radius: 10px;
    }
    
    .gallery::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #3498db, #2980b9);
      border-radius: 10px;
    }
    
    .image-container {
      position: relative;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }
    
    .image-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
    
    .image-container.selected {
      border: 3px solid #e74c3c;
      transform: translateY(-3px);
    }
    
    .image-container img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      cursor: pointer;
      display: block;
    }
    
    .image-checkbox {
      position: absolute;
      top: 8px;
      left: 8px;
      transform: scale(1.3);
      cursor: pointer;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 3px;
      padding: 2px;
    }
    
    .image-name {
      padding: 8px;
      font-size: 11px;
      color: #2c3e50;
      text-align: center;
      word-break: break-all;
      background: rgba(248, 249, 250, 0.9);
    }
    
    .empty-state {
      text-align: center;
      color: #7f8c8d;
      font-size: 18px;
      padding: 50px;
    }
    
    .stats-bar {
      background: linear-gradient(135deg, #34495e, #2c3e50);
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .stat-number {
      font-weight: bold;
      font-size: 1.2em;
      color: #3498db;
    }
    
    @media (max-width: 768px) {
      .controls, .selection-controls, .folder-controls {
        flex-direction: column;
        align-items: stretch;
      }
      
      .search-input, .folder-input {
        width: 100%;
      }
      
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
        padding: 20px;
      }
      
      .image-container img {
        height: 100px;
      }
      
      .folder-tabs {
        padding: 0 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Part Number Image Manager</h1>
    </div>
    
    <div class="controls">
      <label class="file-input-wrapper">
        📁 Choose Images
        <input type="file" id="fileInput" accept="image/*" multiple>
      </label>
      <button id="saveBtn" class="btn btn-save">💾 Save</button>
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search by image Part NO...">
      <button id="viewBtn" class="btn btn-view">👁️ View</button>
    </div>
    
    <div class="folder-controls">
      <input type="text" id="folderInput" class="folder-input" placeholder="Enter folder name...">
      <button id="createFolderBtn" class="btn btn-create">📁 Create Folder</button>
      <span>Current Folder: <strong id="currentFolderName">Default</strong></span>
    </div>
    
    <div class="folder-tabs" id="folderTabs">
      <!-- Folder tabs will be populated here -->
    </div>
    
    <div class="selection-controls">
      <div class="select-all-wrapper">
        <input type="checkbox" id="selectAll">
        <label for="selectAll">Select All</label>
      </div>
      <span class="selected-count" id="selectedCount">0 selected</span>
      <button id="deleteSelectedBtn" class="btn btn-delete" disabled>🗑️ Delete Selected</button>
    </div>
    
    <div class="status" id="status">Ready to upload images...</div>
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>
    
    <div class="stats-bar">
      <div class="stat-item">
        <span>Total Images:</span>
        <span class="stat-number" id="totalCount">0</span>
      </div>
      <div class="stat-item">
        <span>In Folder:</span>
        <span class="stat-number" id="folderCount">0</span>
      </div>
      <div class="stat-item">
        <span>Selected:</span>
        <span class="stat-number" id="selectedDisplay">0</span>
      </div>
      <div class="stat-item">
        <span>Storage Used:</span>
        <span class="stat-number" id="storageUsed">0 MB</span>
      </div>
    </div>
    
    <div class="preview" id="preview">
      <div class="empty-state">
        Select an image to preview
      </div>
    </div>
    
    <div class="gallery" id="gallery">
      <!-- Image containers will populate here -->
    </div>
  </div>

  <script>
    const fileInput         = document.getElementById('fileInput');
    const saveBtn           = document.getElementById('saveBtn');
    const searchInput       = document.getElementById('searchInput');
    const viewBtn           = document.getElementById('viewBtn');
    const folderInput       = document.getElementById('folderInput');
    const createFolderBtn   = document.getElementById('createFolderBtn');
    const folderTabs        = document.getElementById('folderTabs');
    const currentFolderName = document.getElementById('currentFolderName');
    const selectAll         = document.getElementById('selectAll');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    const gallery           = document.getElementById('gallery');
    const preview           = document.getElementById('preview');
    const status            = document.getElementById('status');
    const progressFill      = document.getElementById('progressFill');
    const totalCount        = document.getElementById('totalCount');
    const folderCount       = document.getElementById('folderCount');
    const selectedDisplay   = document.getElementById('selectedDisplay');
    const selectedCount     = document.getElementById('selectedCount');
    const storageUsed       = document.getElementById('storageUsed');

    let folders = JSON.parse(localStorage.getItem('imageFolders') || '{"Default": []}');
    let currentFolder = 'Default';
    let selectedImages = new Set();
    const MAX_SIZE = 2 * 1024 * 1024;
    const BATCH_SIZE = 50;

    function updateStatus(message) {
      status.textContent = message;
    }

    function updateProgress(current, total) {
      const percent = (current / total) * 100;
      progressFill.style.width = `${percent}%`;
    }

    function updateStats() {
      const allImages = Object.values(folders).flat();
      const currentFolderImages = folders[currentFolder] || [];
      
      totalCount.textContent = allImages.length;
      folderCount.textContent = currentFolderImages.length;
      selectedDisplay.textContent = selectedImages.size;
      selectedCount.textContent = `${selectedImages.size} selected`;
      
      const storageSize = JSON.stringify(folders).length;
      storageUsed.textContent = `${(storageSize / (1024 * 1024)).toFixed(1)} MB`;
      
      deleteSelectedBtn.disabled = selectedImages.size === 0;
      currentFolderName.textContent = currentFolder;
      
      // Update select all checkbox
      const displayedCheckboxes = document.querySelectorAll('.image-checkbox');
      const checkedBoxes = document.querySelectorAll('.image-checkbox:checked');
      if (displayedCheckboxes.length > 0) {
        selectAll.indeterminate = checkedBoxes.length > 0 && checkedBoxes.length < displayedCheckboxes.length;
        selectAll.checked = checkedBoxes.length === displayedCheckboxes.length;
      } else {
        selectAll.indeterminate = false;
        selectAll.checked = false;
      }
    }

    function renderFolderTabs() {
      folderTabs.innerHTML = '';
      
      Object.keys(folders).forEach(folderName => {
        const tab = document.createElement('button');
        tab.className = `folder-tab ${folderName === currentFolder ? 'active' : ''}`;
        
        const count = document.createElement('span');
        count.className = 'folder-count';
        count.textContent = folders[folderName].length;
        
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-folder';
        deleteBtn.textContent = '×';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          deleteFolder(folderName);
        };
        
        tab.textContent = folderName;
        tab.appendChild(count);
        
        if (folderName !== 'Default') {
          tab.appendChild(deleteBtn);
        }
        
        tab.addEventListener('click', () => switchFolder(folderName));
        folderTabs.appendChild(tab);
      });
    }

    function switchFolder(folderName) {
      currentFolder = folderName;
      selectedImages.clear();
      renderGallery();
      renderFolderTabs();
      updateStats();
      preview.innerHTML = '<div class="empty-state">Select an image to preview</div>';
    }

    function createFolder() {
      const folderName = folderInput.value.trim();
      if (!folderName) {
        alert('Please enter a folder name');
        return;
      }
      
      if (folders[folderName]) {
        alert('Folder already exists');
        return;
      }
      
      folders[folderName] = [];
      folderInput.value = '';
      renderFolderTabs();
      updateStats();
      updateStatus(`Created folder: ${folderName}`);
    }

    function deleteFolder(folderName) {
      if (folderName === 'Default') {
        alert('Cannot delete Default folder');
        return;
      }
      
      if (confirm(`Delete folder "${folderName}" and all its images?`)) {
        delete folders[folderName];
        if (currentFolder === folderName) {
          switchFolder('Default');
        }
        renderFolderTabs();
        updateStats();
        updateStatus(`Deleted folder: ${folderName}`);
      }
    }

    function compressImage(file, maxSizeMB = 2) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        img.onload = () => {
          let { width, height } = img;
          const maxDimension = 800;
          
          if (width > height && width > maxDimension) {
            height = (height * maxDimension) / width;
            width = maxDimension;
          } else if (height > maxDimension) {
            width = (width * maxDimension) / height;
            height = maxDimension;
          }
          
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          
          const compressedDataURL = canvas.toDataURL('image/jpeg', 0.7);
          resolve(compressedDataURL);
        };
        
        img.src = URL.createObjectURL(file);
      });
    }

    async function processBatch(files, startIndex) {
      const batchEnd = Math.min(startIndex + BATCH_SIZE, files.length);
      const batch = Array.from(files).slice(startIndex, batchEnd);
      
      for (let i = 0; i < batch.length; i++) {
        const file = batch[i];
        const currentIndex = startIndex + i;
        
        updateStatus(`Processing image ${currentIndex + 1} of ${files.length}: ${file.name}`);
        updateProgress(currentIndex + 1, files.length);
        
        try {
          let imageData;
          if (file.size > MAX_SIZE) {
            imageData = await compressImage(file);
          } else {
            imageData = await new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = e => resolve(e.target.result);
              reader.readAsDataURL(file);
            });
          }
          
          const imageObj = {
            id: Date.now() + Math.random(),
            name: file.name,
            src: imageData,
            size: file.size,
            uploadDate: new Date().toISOString(),
            folder: currentFolder
          };
          
          if (!folders[currentFolder]) {
            folders[currentFolder] = [];
          }
          folders[currentFolder].push(imageObj);
          
        } catch (error) {
          console.error(`Error processing ${file.name}:`, error);
        }
        
        await new Promise(resolve => setTimeout(resolve, 10));
      }
      
      renderGallery();
      renderFolderTabs();
      updateStats();
      
      if (batchEnd < files.length) {
        setTimeout(() => processBatch(files, batchEnd), 100);
      } else {
        updateStatus(`Successfully processed ${files.length} images to ${currentFolder} folder`);
        renderGallery();
        updateProgress(0, 1);
      }
    }

    function renderGallery() {
      const currentFolderImages = folders[currentFolder] || [];
      const searchQuery = searchInput.value.trim().toLowerCase();
      
      let displayImages = currentFolderImages;
      if (searchQuery) {
        displayImages = currentFolderImages.filter(img =>
          img.name.toLowerCase().includes(searchQuery)
        );
      }
      
      gallery.innerHTML = '';
      
      if (displayImages.length === 0) {
        gallery.innerHTML = '<div class="empty-state">No images in this folder</div>';
        updateStats();
        return;
      }
      
      displayImages.forEach((img) => {
        const container = document.createElement('div');
        container.className = 'image-container';
        
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'image-checkbox';
        checkbox.value = img.id;
        checkbox.addEventListener('change', handleCheckboxChange);
        
        const image = document.createElement('img');
        image.src = img.src;
        image.alt = img.name;
        image.title = `${img.name} (${(img.size / 1024).toFixed(1)}KB)`;
        image.addEventListener('click', () => showPreview(img));
        
        const nameDiv = document.createElement('div');
        nameDiv.className = 'image-name';
        nameDiv.textContent = img.name;
        
        container.appendChild(checkbox);
        container.appendChild(image);
        container.appendChild(nameDiv);
        gallery.appendChild(container);
      });
      
      updateStats();
    }

    function handleCheckboxChange(e) {
      const imageId = e.target.value;
      const container = e.target.closest('.image-container');
      
      if (e.target.checked) {
        selectedImages.add(imageId);
        container.classList.add('selected');
      } else {
        selectedImages.delete(imageId);
        container.classList.remove('selected');
      }
      
      updateStats();
    }

    function showPreview(img) {
      preview.innerHTML = '';
      const big = document.createElement('img');
      big.src = img.src;
      big.alt = img.name;
      big.title = `${img.name} - Uploaded: ${new Date(img.uploadDate).toLocaleString()}`;
      preview.appendChild(big);
    }

    function deleteSelectedImages() {
      if (selectedImages.size === 0) return;
      
      if (confirm(`Are you sure you want to delete ${selectedImages.size} selected image(s)?`)) {
        folders[currentFolder] = folders[currentFolder].filter(img => 
          !selectedImages.has(img.id.toString())
        );
        
        selectedImages.clear();
        renderGallery();
        renderFolderTabs();
        preview.innerHTML = '<div class="empty-state">Select an image to preview</div>';
        updateStatus(`Deleted selected images from ${currentFolder} folder`);
        updateStats();
      }
    }

    // Initialize
    renderFolderTabs();
    renderGallery();
    updateStats();
    updateStatus(`${Object.values(folders).flat().length} images loaded from storage`);

    // Event listeners
    fileInput.addEventListener('change', () => {
      const files = fileInput.files;
      if (files.length === 0) return;
      
      updateStatus(`Starting upload of ${files.length} images to ${currentFolder} folder...`);
      processBatch(files, 0);
    });

    createFolderBtn.addEventListener('click', createFolder);
    
    folderInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        createFolder();
      }
    });

    saveBtn.addEventListener('click', () => {
      try {
        localStorage.setItem('imageFolders', JSON.stringify(folders));
        updateStatus(`All folders and images saved successfully!`);
      } catch (error) {
        updateStatus('Storage limit exceeded! Try clearing some images.');
      }
    });

    selectAll.addEventListener('change', (e) => {
      const checkboxes = document.querySelectorAll('.image-checkbox');
      const containers = document.querySelectorAll('.image-container');
      
      checkboxes.forEach((checkbox, idx) => {
        checkbox.checked = e.target.checked;
        const container = containers[idx];
        
        if (e.target.checked) {
          selectedImages.add(checkbox.value);
          container.classList.add('selected');
        } else {
          selectedImages.delete(checkbox.value);
          container.classList.remove('selected');
        }
      });
      
      updateStats();
    });

    deleteSelectedBtn.addEventListener('click', deleteSelectedImages);

    viewBtn.addEventListener('click', renderGallery);

    // Handle keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Delete' && selectedImages.size > 0) {
        deleteSelectedImages();
      }
      
      if (e.ctrlKey && e.key === 'a') {
        e.preventDefault();
        selectAll.checked = true;
        selectAll.dispatchEvent(new Event('change'));
      }
    });
  </script>
</body>
</html>
